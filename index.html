<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>

<script>
emailjs.init("F65Acn1Zz8d8kPQEx");

/* BOOKINGS STORAGE */
let bookings = JSON.parse(localStorage.getItem("bookings")) || [];

/* BOOKING FUNCTION (UPDATED ONLY WITH EMAILJS) */
function submitBooking(e){
  e.preventDefault();

  const booking = {
    name: name.value,
    phone: phone.value,
    email: email.value,
    checkin: checkin.value,
    checkout: checkout.value,
    guests: guests.value,
    room: room.value,
    requests: requests.value,
    status: "Pending"
  };

  // Save locally (your admin system still works)
  bookings.push(booking);
  localStorage.setItem("bookings", JSON.stringify(bookings));

  // EMAIL CONFIRMATION (NEW FEATURE ONLY)
  emailjs.send("service_tn16zcu", "template_h4oq7mf", {
    name: booking.name,
    email: booking.email,
    phone: booking.phone,
    checkin: booking.checkin,
    checkout: booking.checkout,
    room: booking.room,
    message: booking.requests,
    guests: booking.guests
  })
  .then(() => {
    alert("Booking submitted successfully! Email sent.");
    e.target.reset();
  })
  .catch((error) => {
    console.log("EmailJS Error:", error);
    alert("Booking saved, but email failed. Check EmailJS setup.");
    e.target.reset();
  });
}

/* ADMIN (UNCHANGED) */
function openAdmin(){
  document.getElementById("adminModal").style.display = "flex";
}

function closeAdmin(){
  document.getElementById("adminModal").style.display = "none";
}

function login(){
  if(adminUser.value === "admin" && adminPass.value === "demo123"){
    dashboard.style.display = "block";
    loadBookings();
  } else {
    alert("Invalid login");
  }
}

function loadBookings(){
  const container = document.getElementById("bookings");
  container.innerHTML = "";

  bookings.forEach((b, i) => {
    container.innerHTML += `
      <div class="booking-item">
        <b>${b.name}</b><br/>
        ${b.room} | ${b.checkin} → ${b.checkout}<br/>
        Status: ${b.status}<br/><br/>
        <button onclick="approve(${i})">Approve</button>
        <button onclick="reject(${i})">Reject</button>
      </div>
    `;
  });
}

function approve(i){
  bookings[i].status = "Approved";
  localStorage.setItem("bookings", JSON.stringify(bookings));
  loadBookings();
}

function reject(i){
  bookings[i].status = "Rejected";
  localStorage.setItem("bookings", JSON.stringify(bookings));
  loadBookings();
}

window.onclick = function(e){
  const modal = document.getElementById("adminModal");
  if(e.target === modal){
    modal.style.display = "none";
  }
}
</script>
