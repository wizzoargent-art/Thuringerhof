<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>

<script>
emailjs.init("F65Acn1Zz8d8kPQEx");

/* BOOKINGS */
let bookings = JSON.parse(localStorage.getItem("bookings")) || [];

/* SAFE BOOKING FUNCTION */
function submitBooking(e){
  e.preventDefault();

  const booking = {
    name: document.getElementById("name").value,
    phone: document.getElementById("phone").value,
    email: document.getElementById("email").value,
    checkin: document.getElementById("checkin").value,
    checkout: document.getElementById("checkout").value,
    guests: document.getElementById("guests").value,
    room: document.getElementById("room").value,
    requests: document.getElementById("requests").value,
    status: "Pending"
  };

  // SAVE LOCALLY (ADMIN STILL WORKS)
  bookings.push(booking);
  localStorage.setItem("bookings", JSON.stringify(bookings));

  // EMAIL (SAFE - WON'T BREAK PAGE)
  try {
    emailjs.send("service_tn16zcu", "template_h4oq7mf", {
      name: booking.name,
      email: booking.email,
      phone: booking.phone,
      checkin: booking.checkin,
      checkout: booking.checkout,
      room: booking.room,
      message: booking.requests,
      guests: booking.guests
    }).then(() => {
      alert("Booking sent successfully!");
    }).catch((err) => {
      console.log("EmailJS failed:", err);
      alert("Booking saved but email failed.");
    });
  } catch (e) {
    console.log("Email system error:", e);
  }

  e.target.reset();
}

/* ADMIN (UNCHANGED) */
function openAdmin(){
  document.getElementById("adminModal").style.display = "flex";
}

function closeAdmin(){
  document.getElementById("adminModal").style.display = "none";
}

function login(){
  if(document.getElementById("adminUser").value === "admin" &&
     document.getElementById("adminPass").value === "demo123"){
    document.getElementById("dashboard").style.display = "block";
    loadBookings();
  } else {
    alert("Invalid login");
  }
}

function loadBookings(){
  const container = document.getElementById("bookings");
  container.innerHTML = "";

  bookings.forEach((b, i) => {
    container.innerHTML += `
      <div class="booking-item">
        <b>${b.name}</b><br/>
        ${b.room} | ${b.checkin} → ${b.checkout}<br/>
        Status: ${b.status}<br/><br/>
        <button onclick="approve(${i})">Approve</button>
        <button onclick="reject(${i})">Reject</button>
      </div>
    `;
  });
}

function approve(i){
  bookings[i].status = "Approved";
  localStorage.setItem("bookings", JSON.stringify(bookings));
  loadBookings();
}

function reject(i){
  bookings[i].status = "Rejected";
  localStorage.setItem("bookings", JSON.stringify(bookings));
  loadBookings();
}

window.onclick = function(e){
  const modal = document.getElementById("adminModal");
  if(e.target === modal){
    modal.style.display = "none";
  }
}
</script>
